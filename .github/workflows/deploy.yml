name: פרסום האתר ל-GitHub Pages

# מתפרסם אוטומטית בכל עדכון של הענף הראשי, או בהפעלה ידנית.
on:
  push:
    branches: [main]
  workflow_dispatch:

# הרשאות הדרושות לפרסום ב-Pages
permissions:
  contents: read
  pages: write
  id-token: write

# מבטיח פרסום אחד בכל פעם
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: שליפת הקוד
        uses: actions/checkout@v4

      - name: התקנת Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: התקנת חבילות
        run: npm ci

      - name: בניית האתר (מצב הדגמה, ללא חיבור למסד נתונים)
        # base נקבע לפי שם המאגר כדי שהקבצים ייטענו נכון בכתובת המשנה.
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: יצירת קובץ נפילה לניתוב (SPA 404 fallback)
        run: cp dist/index.html dist/404.html

      - name: הכנת Pages
        uses: actions/configure-pages@v5
        with:
          # מפעיל את GitHub Pages אוטומטית אם עדיין לא הופעל
          enablement: true

      - name: העלאת התוצר
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: פרסום
        id: deployment
        uses: actions/deploy-pages@v4
